<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="diamondFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D9FF5C" />
      <stop offset="100%" stop-color="#9EDC23" />
    </linearGradient>
    <linearGradient id="starFill" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#E3FF8A" />
      <stop offset="100%" stop-color="#C6FF3A" />
    </linearGradient>
    <filter id="outerGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur" />
      <feFlood flood-color="#C6FF3A" flood-opacity="0.6" />
      <feComposite in2="blur" operator="in" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Rotated diamond (rounded square) -->
  <g filter="url(#outerGlow)" transform="translate(256 256) rotate(45) translate(-150 -150)">
    <rect x="0" y="0" width="300" height="300" rx="36" ry="36" fill="url(#diamondFill)" />
    <rect x="40" y="40" width="220" height="220" rx="20" ry="20" fill="#0D0E2A" />
  </g>

  <!-- 4-pointed sparkle -->
  <g transform="translate(256 256)">
    <path
      d="M 0,-110 C 6,-40 6,-40 18,-18 C 40,-6 40,-6 110,0 C 40,6 40,6 18,18 C 6,40 6,40 0,110 C -6,40 -6,40 -18,18 C -40,6 -40,6 -110,0 C -40,-6 -40,-6 -18,-18 C -6,-40 -6,-40 0,-110 Z"
      fill="url(#starFill)"
    />
  </g>
</svg>
